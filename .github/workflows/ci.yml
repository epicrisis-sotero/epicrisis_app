name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Type Check (Lint)
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Push DB Schema
        if: github.event_name == 'push'
        run: npm run db:push
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
